version: '3.8'

services:
  picture-embedding:
    # 与平台同仓库；CPU 镜像 tag：picture-embedding-<版本>-cpu（GPU 见 docker-compose.prod.gpu.yml）
    image: crpi-pfk0ggqf1mx18vfr.cn-shanghai.personal.cr.aliyuncs.com/whalesbot/whalesbot-ai-platform:picture-embedding-latest-cpu

    # 本地构建时注释 image，启用 build
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    # image: picture-embedding:latest

    container_name: picture-embedding
    restart: always
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Asia/Shanghai
    volumes:
      # 项目根: /data/www/whalesbot-ai-platform/picture_embedding
      - /data/www/whalesbot-ai-platform/picture_embedding/data:/app/data
      - /data/models:/app/models:ro
      - /data/www/whalesbot-ai-platform/picture_embedding/logs:/app/logs
    ports:
      - "8010:8010"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"
        labels: "app=picture-embedding,env=prod"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/picture-embedding/openapi.json', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G
