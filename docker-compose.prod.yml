version: '3.8'

services:
  picture-embedding:
    # 方式一：阿里云镜像（生产推荐，请修改区域与版本标签）
    image: registry.cn-hangzhou.aliyuncs.com/dejavu_ding/picture-embedding:latest

    # 方式二：本地构建（注释上一行 image，启用下面 build）
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    # image: picture-embedding:latest

    container_name: picture-embedding
    restart: always
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Asia/Shanghai
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./logs:/app/logs
    ports:
      - "8010:8010"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"
        labels: "app=picture-embedding,env=prod"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/picture-embedding/openapi.json', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G
